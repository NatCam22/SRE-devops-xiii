replicaCount: 1

image:
  repository: ghcr.io/natcam22/sre-practica-devops-xiii
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  httpPort: 8081
  metricsPort: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

livenessProbe:
  path: /health
  port: 8081
  initialDelaySeconds: 10
  periodSeconds: 5

readinessProbe:
  path: /health
  port: 8081
  initialDelaySeconds: 5
  periodSeconds: 5